name: CI/CD

on:
  push:
    branches:
      - "VH-*"
      - "VH/**"
      - "vh-*"
      - "vh/**"
  pull_request:
    branches:
      - main
      - staging
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_PROFILE_NAME: Twingers
  TERRAFORM_DIR: src/Infrastructure/terraform
  ADMIN_EMAIL: mtesqtsdlc2@gmail.com
  ADMIN_PASSWORD: Password123@

jobs:
  prepare:
    name: Prepare Metadata
    runs-on: ubuntu-latest
    outputs:
      workspace: ${{ steps.meta.outputs.workspace }}
      prod_workspace: ${{ steps.meta.outputs.prod_workspace }}
      test_workspace: ${{ steps.meta.outputs.test_workspace }}
      build_configuration: ${{ steps.meta.outputs.build_configuration }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      environment_name: ${{ steps.meta.outputs.environment_name }}
    steps:
      - name: Compute workspace, image tag and build config
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          RAW_REF="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          WORKSPACE="$(echo "$RAW_REF" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's#[^a-z0-9-]#-#g' \
            | sed -E 's#-+#-#g' \
            | sed -E 's#(^-|-$)##g' \
            | cut -c1-18)"
          if [[ -z "$WORKSPACE" ]]; then WORKSPACE="default"; fi
          PROD_WORKSPACE="${WORKSPACE}-prod"
          TEST_WORKSPACE="${WORKSPACE}-test"

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            BUILD_CONFIGURATION="Release"
            ENVIRONMENT_NAME="Production"
          else
            BUILD_CONFIGURATION="Debug"
            ENVIRONMENT_NAME="Development"
          fi

          IMAGE_TAG="${WORKSPACE}-${GITHUB_SHA::7}"

          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "prod_workspace=$PROD_WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "test_workspace=$TEST_WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "build_configuration=$BUILD_CONFIGURATION" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "environment_name=$ENVIRONMENT_NAME" >> "$GITHUB_OUTPUT"

  terraform_prod:
    name: Terraform Apply (prod workspace)
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Node.js for lambda packaging
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install zip tool
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Build and package lambda artifacts required by Terraform
        shell: bash
        run: |
          set -euo pipefail
          for lambda_dir in \
            "src/Infrastructure/terraform/Lambdas/Payments" \
            "src/Infrastructure/terraform/Lambdas/SendEmail" \
            "src/Infrastructure/terraform/Lambdas/VerificationCode"
          do
            pushd "$lambda_dir" >/dev/null
            pnpm install --no-frozen-lockfile
            pnpm run build
            pnpm run zip
            popd >/dev/null
          done

      - name: Terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init

      - name: Select/Create prod workspace
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform workspace select -or-create "${{ needs.prepare.outputs.prod_workspace }}"

      - name: Terraform apply (prod)
        working-directory: ${{ env.TERRAFORM_DIR }}
        env:
          TF_VAR_prod_deployment: "true"
          TF_VAR_create_ssh_key_pair: "true"
          TF_VAR_enable_ssh_ingress: "true"
          TF_VAR_stripe_api_key: ${{ secrets.STRIPE_API_KEY }}
          TF_VAR_stripe_event_bus_arn: ${{ secrets.STRIPE_EVENT_BUS_ARN }}
          TF_VAR_password_reset_token_secret: ${{ secrets.PASSWORD_RESET_TOKEN_SECRET }}
        run: terraform apply -auto-approve

      - name: Export prod terraform outputs (encrypted artifact)
        working-directory: ${{ env.TERRAFORM_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          terraform output -json > terraform-outputs.json

          # Validate required keys exist.
          jq -er '.backend_ecr_repository_url.value' terraform-outputs.json >/dev/null
          jq -er '.backend_ec2_instance_id.value' terraform-outputs.json >/dev/null
          jq -er '.backend_ec2_ssh_private_key_ssm_parameter_name.value' terraform-outputs.json >/dev/null
          jq -er '.cognito_pool_id.value' terraform-outputs.json >/dev/null
          jq -er '.users_table_name.value' terraform-outputs.json >/dev/null

      - name: Encrypt prod terraform outputs
        uses: ./.github/actions/openssl-encrypt
        with:
          in: ${{ env.TERRAFORM_DIR }}/terraform-outputs.json
          out: ${{ env.TERRAFORM_DIR }}/terraform-outputs.json.enc
          passphrase: ${{ secrets.PASSWORD_RESET_TOKEN_SECRET }}

      - name: Upload prod outputs artifact
        uses: actions/upload-artifact@v6
        with:
          name: terraform-prod-outputs
          path: ${{ env.TERRAFORM_DIR }}/terraform-outputs.json.enc
          if-no-files-found: error
          retention-days: 1

  terraform_test:
    name: Terraform Apply (test workspace)
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Node.js for lambda packaging
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install zip tool
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Build and package lambda artifacts required by Terraform
        shell: bash
        run: |
          set -euo pipefail
          for lambda_dir in \
            "src/Infrastructure/terraform/Lambdas/Payments" \
            "src/Infrastructure/terraform/Lambdas/SendEmail" \
            "src/Infrastructure/terraform/Lambdas/VerificationCode"
          do
            pushd "$lambda_dir" >/dev/null
            pnpm install --no-frozen-lockfile
            pnpm run build
            pnpm run zip
            popd >/dev/null
          done

      - name: Terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init

      - name: Select/Create test workspace
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform workspace select -or-create "${{ needs.prepare.outputs.test_workspace }}"

      - name: Terraform apply (test)
        working-directory: ${{ env.TERRAFORM_DIR }}
        env:
          TF_VAR_prod_deployment: "false"
          TF_VAR_create_ssh_key_pair: "true"
          TF_VAR_stripe_api_key: ${{ secrets.STRIPE_API_KEY }}
          TF_VAR_stripe_event_bus_arn: ${{ secrets.STRIPE_EVENT_BUS_ARN }}
          TF_VAR_password_reset_token_secret: ${{ secrets.PASSWORD_RESET_TOKEN_SECRET }}
        run: terraform apply -auto-approve

      - name: Export test terraform outputs (encrypted artifact)
        working-directory: ${{ env.TERRAFORM_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          terraform output -json > terraform-outputs.json

          # Validate required keys exist.
          jq -er '.verification_codes_table_name.value' terraform-outputs.json >/dev/null
          jq -er '.user_codes_table_name.value' terraform-outputs.json >/dev/null

      - name: Encrypt test terraform outputs
        uses: ./.github/actions/openssl-encrypt
        with:
          in: ${{ env.TERRAFORM_DIR }}/terraform-outputs.json
          out: ${{ env.TERRAFORM_DIR }}/terraform-outputs.json.enc
          passphrase: ${{ secrets.PASSWORD_RESET_TOKEN_SECRET }}

      - name: Upload test outputs artifact
        uses: actions/upload-artifact@v6
        with:
          name: terraform-test-outputs
          path: ${{ env.TERRAFORM_DIR }}/terraform-outputs.json.enc
          if-no-files-found: error
          retention-days: 1

  tests_core:
    name: Tests (unit + functional + integration)
    runs-on: ubuntu-latest
    needs: [prepare, terraform_test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run core tests
        uses: ./.github/actions/dotnet-tests-with-tf-outputs
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          aws-profile-name: ${{ env.AWS_PROFILE_NAME }}
          terraform-outputs-artifact-name: terraform-test-outputs
          appsettings-path: src/Web/appsettings.Test.json
          password-reset-token-secret: ${{ secrets.PASSWORD_RESET_TOKEN_SECRET }}
          stripe-secret-key: ${{ secrets.STRIPE_API_KEY }}
          projects: |
            tests/Domain.UnitTests/Domain.UnitTests.csproj
            tests/Application.UnitTests/Application.UnitTests.csproj
            tests/Application.FunctionalTests/Application.FunctionalTests.csproj
            tests/Infrastructure.UnitTests/Infrastructure.UnitTests.csproj
            tests/Infrastructure.IntegrationTests/Infrastructure.IntegrationTests.csproj

  tests_acceptance:
    name: Tests (acceptance)
    runs-on: ubuntu-latest
    needs: [prepare, terraform_test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run acceptance tests
        uses: ./.github/actions/dotnet-tests-with-tf-outputs
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          aws-profile-name: ${{ env.AWS_PROFILE_NAME }}
          terraform-outputs-artifact-name: terraform-test-outputs
          appsettings-path: src/Web/appsettings.Test.json
          password-reset-token-secret: ${{ secrets.PASSWORD_RESET_TOKEN_SECRET }}
          stripe-secret-key: ${{ secrets.STRIPE_API_KEY }}
          projects: |
            tests/Web.AcceptanceTests/Web.AcceptanceTests.csproj

  build_and_push:
    name: Build Docker Image And Push To ECR
    runs-on: ubuntu-latest
    needs: [prepare, terraform_prod, tests_core, tests_acceptance]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with: 
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download prod terraform outputs
        uses: actions/download-artifact@v7
        with:
          name: terraform-prod-outputs
          path: /tmp/terraform-outputs-prod

      - name: Decrypt prod terraform outputs
        uses: ./.github/actions/openssl-decrypt
        with:
          in: /tmp/terraform-outputs-prod/terraform-outputs.json.enc
          out: /tmp/tf-prod.json
          passphrase: ${{ secrets.PASSWORD_RESET_TOKEN_SECRET }}

      - name: Sync terraform outputs into appsettings files
        shell: bash
        env:
          PASSWORD_RESET_TOKEN_SECRET: ${{ secrets.PASSWORD_RESET_TOKEN_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_API_KEY }}
        run: |
          set -euo pipefail
          chmod +x ./update-appsettings-from-terraform.sh
          ./update-appsettings-from-terraform.sh --tf-outputs-json /tmp/tf-prod.json "src/Web/appsettings.json"
          ./update-appsettings-from-terraform.sh --tf-outputs-json /tmp/tf-prod.json "src/Web/appsettings.Development.json"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
          BUILD_CONFIGURATION: ${{ needs.prepare.outputs.build_configuration }}
          CACHE_SCOPE: vibraheka-backend-${{ needs.prepare.outputs.workspace }}
        run: |
          set -euo pipefail
          ECR_REPOSITORY_URL="$(jq -r '.backend_ecr_repository_url.value' /tmp/tf-prod.json)"
          if [[ -z "${ECR_REPOSITORY_URL:-}" || "${ECR_REPOSITORY_URL}" == "null" ]]; then
            echo "backend_ecr_repository_url is empty/null. Terraform output is not available."
            exit 1
          fi

          IMAGE_URI="${ECR_REPOSITORY_URL}:${IMAGE_TAG}"
          docker buildx build \
            --platform linux/arm64 \
            --cache-from type=gha,scope="${CACHE_SCOPE}" \
            --cache-to type=gha,mode=max,scope="${CACHE_SCOPE}" \
            --build-arg BUILD_CONFIGURATION="${BUILD_CONFIGURATION}" \
            -t "${IMAGE_URI}" \
            --push \
            .

  seed_default_admin:
    name: Seed Default Admin User
    runs-on: ubuntu-latest
    needs: [terraform_prod]
    steps:
      - name: Download prod terraform outputs
        uses: actions/download-artifact@v7
        with:
          name: terraform-prod-outputs
          path: /tmp/terraform-outputs

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Decrypt prod terraform outputs
        uses: ./.github/actions/openssl-decrypt
        with:
          in: /tmp/terraform-outputs/terraform-outputs.json.enc
          out: /tmp/tf-prod.json
          passphrase: ${{ secrets.PASSWORD_RESET_TOKEN_SECRET }}

      - name: Create/confirm Cognito admin and seed DynamoDB admin row
        shell: bash
        env:
          ADMIN_EMAIL: ${{ env.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ env.ADMIN_PASSWORD }}
        run: |
          set -euo pipefail

          USER_POOL_ID="$(jq -r '.cognito_pool_id.value' /tmp/tf-prod.json)"
          USERS_TABLE="$(jq -r '.users_table_name.value' /tmp/tf-prod.json)"

          echo "Seed inputs: USER_POOL_ID='${USER_POOL_ID}', USERS_TABLE='${USERS_TABLE}'"
          if [[ -z "${USER_POOL_ID:-}" || -z "${USERS_TABLE:-}" || "${USER_POOL_ID}" == "null" || "${USERS_TABLE}" == "null" ]]; then
            echo "USER_POOL_ID or USERS_TABLE is empty; cannot seed admin user."
            exit 1
          fi

          if ! aws cognito-idp admin-get-user --user-pool-id "$USER_POOL_ID" --username "$ADMIN_EMAIL" >/dev/null 2>&1; then
            aws cognito-idp admin-create-user \
              --user-pool-id "$USER_POOL_ID" \
              --username "$ADMIN_EMAIL" \
              --user-attributes \
                Name=email,Value="$ADMIN_EMAIL" \
                Name=email_verified,Value=true \
                Name=name,Value="Default Admin" \
              --message-action SUPPRESS
          fi

          aws cognito-idp admin-set-user-password \
            --user-pool-id "$USER_POOL_ID" \
            --username "$ADMIN_EMAIL" \
            --password "$ADMIN_PASSWORD" \
            --permanent

          SUB="$(aws cognito-idp admin-get-user \
            --user-pool-id "$USER_POOL_ID" \
            --username "$ADMIN_EMAIL" \
            --query "UserAttributes[?Name=='sub']|[0].Value" \
            --output text)"

          NOW="$(date -u +"%Y-%m-%dT%H:%M:%S.0000000+00:00")"

          aws dynamodb put-item \
            --table-name "$USERS_TABLE" \
            --item "{\
              \"Id\": {\"S\": \"$SUB\"},\
              \"CustomerID\": {\"S\": \"\"},\
              \"Email\": {\"S\": \"$ADMIN_EMAIL\"},\
              \"FirstName\": {\"S\": \"Default\"},\
              \"MiddleName\": {\"S\": \"\"},\
              \"LastName\": {\"S\": \"Admin\"},\
              \"PhoneNumber\": {\"S\": \"+34600000000\"},\
              \"Bio\": {\"S\": \"System default administrator\"},\
              \"TimezoneID\": {\"S\": \"Europe/Madrid\"},\
              \"ProfilePictureUrl\": {\"S\": \"\"},\
              \"Role\": {\"S\": \"Admin\"},\
              \"Created\": {\"S\": \"$NOW\"},\
              \"CreatedBy\": {\"S\": \"$SUB\"},\
              \"LastModified\": {\"S\": \"$NOW\"},\
              \"LastModifiedBy\": {\"S\": \"$SUB\"}\
            }"

  deploy_ec2:
    name: Deploy Backend And XRay On EC2
    runs-on: ubuntu-latest
    needs: [build_and_push]
    steps:
      - name: Compute deploy metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          RAW_REF="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          WORKSPACE="$(echo "$RAW_REF" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's#[^a-z0-9-]#-#g' \
            | sed -E 's#-+#-#g' \
            | sed -E 's#(^-|-$)##g' \
            | cut -c1-18)"
          if [[ -z "$WORKSPACE" ]]; then WORKSPACE="default"; fi

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            ENVIRONMENT_NAME="Production"
          else
            ENVIRONMENT_NAME="Development"
          fi

          IMAGE_TAG="${WORKSPACE}-${GITHUB_SHA::7}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "environment_name=${ENVIRONMENT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Download prod terraform outputs
        uses: actions/download-artifact@v7
        with:
          name: terraform-prod-outputs
          path: /tmp/terraform-outputs

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Decrypt prod terraform outputs
        uses: ./.github/actions/openssl-decrypt
        with:
          in: /tmp/terraform-outputs/terraform-outputs.json.enc
          out: /tmp/tf-prod.json
          passphrase: ${{ secrets.PASSWORD_RESET_TOKEN_SECRET }}

      - name: Compute deploy inputs
        shell: bash
        run: |
          set -euo pipefail
          ECR_REPOSITORY_URL="$(jq -r '.backend_ecr_repository_url.value' /tmp/tf-prod.json)"
          EC2_INSTANCE_ID="$(jq -r '.backend_ec2_instance_id.value' /tmp/tf-prod.json)"
          SSH_KEY_PARAM="$(jq -r '.backend_ec2_ssh_private_key_ssm_parameter_name.value' /tmp/tf-prod.json)"

          if [[ -z "${ECR_REPOSITORY_URL:-}" || "${ECR_REPOSITORY_URL}" == "null" ]]; then
            echo "backend_ecr_repository_url is empty/null."
            exit 1
          fi
          if [[ -z "${EC2_INSTANCE_ID:-}" || "${EC2_INSTANCE_ID}" == "null" ]]; then
            echo "backend_ec2_instance_id is empty/null."
            exit 1
          fi
          if [[ -z "${SSH_KEY_PARAM:-}" || "${SSH_KEY_PARAM}" == "null" ]]; then
            echo "backend_ec2_ssh_private_key_ssm_parameter_name is empty/null."
            exit 1
          fi

          IMAGE_URI="${ECR_REPOSITORY_URL}:${{ steps.meta.outputs.image_tag }}"
          {
            printf 'IMAGE_URI=%q\n' "$IMAGE_URI"
            printf 'EC2_INSTANCE_ID=%q\n' "$EC2_INSTANCE_ID"
            printf 'SSH_KEY_PARAM=%q\n' "$SSH_KEY_PARAM"
          } > /tmp/deploy.env

      - name: Install Session Manager plugin (for SSH over SSM)
        shell: bash
        run: |
          set -euo pipefail
          curl -sSLo /tmp/session-manager-plugin.deb https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb
          sudo dpkg -i /tmp/session-manager-plugin.deb

      - name: Retrieve generated SSH private key from SSM
        shell: bash
        run: |
          set -euo pipefail
          source /tmp/deploy.env
          aws ssm get-parameter --name "$SSH_KEY_PARAM" --with-decryption --query Parameter.Value --output text > /tmp/vibraheka-ec2.key
          chmod 600 /tmp/vibraheka-ec2.key

      - name: Build SSH config for SSM tunnel
        shell: bash
        run: |
          set -euo pipefail
          source /tmp/deploy.env
          mkdir -p ~/.ssh
          cat > ~/.ssh/config <<EOF
          Host vibraheka-ec2
            User ec2-user
            HostName 127.0.0.1
            IdentityFile /tmp/vibraheka-ec2.key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyCommand sh -c "aws ssm start-session --target ${EC2_INSTANCE_ID} --document-name AWS-StartSSHSession --parameters 'portNumber=%p'"
          EOF

      - name: Deploy backend + xray containers in EC2
        shell: bash
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          APP_ENVIRONMENT: ${{ steps.meta.outputs.environment_name }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          source /tmp/deploy.env
          AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ssh vibraheka-ec2 "AWS_REGION='${AWS_REGION}' AWS_ACCOUNT_ID='${AWS_ACCOUNT_ID}' IMAGE_URI='${IMAGE_URI}' APP_ENVIRONMENT='${APP_ENVIRONMENT}' CI_AWS_ACCESS_KEY_ID='${AWS_ACCESS_KEY_ID}' CI_AWS_SECRET_ACCESS_KEY='${AWS_SECRET_ACCESS_KEY}' bash -s" <<'REMOTE'
            set -euxo pipefail
            echo "[deploy] starting on $(date -u +%FT%TZ)"
            timeout 600 sudo dnf -y update || true
            timeout 600 sudo dnf -y install docker awscli
            timeout 60 sudo systemctl enable docker
            timeout 60 sudo systemctl start docker
            timeout 30 sudo systemctl is-active docker

            sudo mkdir -p /opt/vibraheka/.aws
            sudo chmod 700 /opt/vibraheka/.aws
            sudo sh -c "printf '%s\n' \
              '[default]' \
              'aws_access_key_id = ${CI_AWS_ACCESS_KEY_ID}' \
              'aws_secret_access_key = ${CI_AWS_SECRET_ACCESS_KEY}' \
              '' \
              '[Twingers]' \
              'aws_access_key_id = ${CI_AWS_ACCESS_KEY_ID}' \
              'aws_secret_access_key = ${CI_AWS_SECRET_ACCESS_KEY}' \
              > /opt/vibraheka/.aws/credentials"
            sudo sh -c "printf '%s\n' \
              '[default]' \
              'region = ${AWS_REGION}' \
              'output = json' \
              '' \
              '[profile Twingers]' \
              'region = ${AWS_REGION}' \
              'output = json' \
              > /opt/vibraheka/.aws/config"
            # Container runs as non-root (UID/GID 10001), so credentials must be world-readable inside the container.
            sudo chmod 644 /opt/vibraheka/.aws/credentials /opt/vibraheka/.aws/config

            timeout 120 aws ecr get-login-password --region "${AWS_REGION}" \
              | sudo docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

            timeout 300 sudo docker pull "${IMAGE_URI}"

            sudo docker rm -f vibraheka-backend || true
            sudo docker rm -f xray-daemon || true

            if timeout 120 sudo docker pull public.ecr.aws/xray/aws-xray-daemon:latest; then
              sudo docker run -d \
                --name xray-daemon \
                --restart always \
                -p 2000:2000/udp \
                -e AWS_ACCESS_KEY_ID=${CI_AWS_ACCESS_KEY_ID} \
                -e AWS_SECRET_ACCESS_KEY=${CI_AWS_SECRET_ACCESS_KEY} \
                -e AWS_XRAY_DAEMON_ADDRESS="127.0.0.1:2000" \
                -e AWS_REGION="${AWS_REGION}" \
                -e AWS_SHARED_CREDENTIALS_FILE="/aws/credentials" \
                -e AWS_CONFIG_FILE="/aws/config" \
                -v /opt/vibraheka/.aws:/aws:ro \
                public.ecr.aws/xray/aws-xray-daemon:latest
            else
              echo "[deploy] xray image pull skipped (no internet/public registry access)."
            fi

            sudo docker run -d \
              --name vibraheka-backend \
              --restart always \
              -p 8080:8080 \
              -e ASPNETCORE_ENVIRONMENT="${APP_ENVIRONMENT}" \
              -e AWS_PROFILE="Twingers" \
              -e AWS__Profile="Twingers" \
              -e AWSLogging__Profile="Twingers" \
              -e AWS_SHARED_CREDENTIALS_FILE="/aws/credentials" \
              -e AWS_CONFIG_FILE="/aws/config" \
              -v /opt/vibraheka/.aws:/aws:ro \
              "${IMAGE_URI}"

            sudo docker ps
            echo "[deploy] finished on $(date -u +%FT%TZ)"
          REMOTE

  cleanup_artifacts:
    name: Cleanup Terraform Output Artifacts
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs: [terraform_prod, terraform_test, tests_core, tests_acceptance, build_and_push, seed_default_admin, deploy_ec2]
    steps:
      - name: Delete terraform output artifacts for this run
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.runId;
            const namesToDelete = new Set(["terraform-prod-outputs", "terraform-test-outputs"]);

            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              { owner, repo, run_id: runId, per_page: 100 }
            );

            const matches = artifacts.filter(a => namesToDelete.has(a.name));
            core.info(`Found ${matches.length} artifacts to delete.`);

            for (const a of matches) {
              core.info(`Deleting artifact: ${a.name} (id=${a.id})`);
              await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: a.id });
            }
