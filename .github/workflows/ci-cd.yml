name: CI/CD

on:
  push:
    branches:
      - "VH-*"
      - "VH/**"
      - "vh-*"
      - "vh/**"
  pull_request:
    branches:
      - main
      - staging
  workflow_dispatch:


env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_PROFILE_NAME: Twingers
  TERRAFORM_DIR: src/Infrastructure/terraform
  ADMIN_EMAIL: mtesqtsdlc2@gmail.com
  ADMIN_PASSWORD: Password123@

jobs:
  prepare:
    name: Prepare Metadata
    runs-on: ubuntu-latest
    outputs:
      workspace: ${{ steps.meta.outputs.workspace }}
      prod_workspace: ${{ steps.meta.outputs.prod_workspace }}
      test_workspace: ${{ steps.meta.outputs.test_workspace }}
      build_configuration: ${{ steps.meta.outputs.build_configuration }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      environment_name: ${{ steps.meta.outputs.environment_name }}
    steps:
      - name: Compute workspace, image tag and build config
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          RAW_REF="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          WORKSPACE="$(echo "$RAW_REF" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's#[^a-z0-9-]#-#g' \
            | sed -E 's#-+#-#g' \
            | sed -E 's#(^-|-$)##g' \
            | cut -c1-18)"
          if [[ -z "$WORKSPACE" ]]; then WORKSPACE="default"; fi
          PROD_WORKSPACE="${WORKSPACE}-prod"
          TEST_WORKSPACE="${WORKSPACE}-test"

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            BUILD_CONFIGURATION="Release"
            ENVIRONMENT_NAME="Production"
          else
            BUILD_CONFIGURATION="Debug"
            ENVIRONMENT_NAME="Development"
          fi

          IMAGE_TAG="${WORKSPACE}-${GITHUB_SHA::7}"

          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "prod_workspace=$PROD_WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "test_workspace=$TEST_WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "build_configuration=$BUILD_CONFIGURATION" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "environment_name=$ENVIRONMENT_NAME" >> "$GITHUB_OUTPUT"

  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [ prepare ]
    outputs:
      backend_api_gateway_endpoint: ${{ steps.prod_outputs.outputs.backend_api_gateway_endpoint }}
      backend_api_gateway_base_route: ${{ steps.prod_outputs.outputs.backend_api_gateway_base_route }}
      backend_ecr_repository_url: ${{ steps.prod_outputs.outputs.backend_ecr_repository_url }}
      backend_ec2_instance_id: ${{ steps.prod_outputs.outputs.backend_ec2_instance_id }}
      backend_ec2_ssh_private_key_ssm_parameter_name: ${{ steps.prod_outputs.outputs.backend_ec2_ssh_private_key_ssm_parameter_name }}
      users_table_name: ${{ steps.prod_outputs.outputs.users_table_name }}
      user_codes_table_name: ${{ steps.prod_outputs.outputs.user_codes_table_name }}
      cognito_pool_id: ${{ steps.prod_outputs.outputs.cognito_pool_id }}
      cognito_client_id: ${{ steps.prod_outputs.outputs.cognito_client_id }}
      
      verification_codes_table_name: ${{ steps.prod_outputs.outputs.verification_codes_table_name }}
      test_verification_codes_table_name: ${{ steps.outputs_test.outputs.verification_codes_table_name }}
      test_user_codes_table_name: ${{ steps.outputs_test.outputs.user_codes_table_name }}
      email_templates_table_name: ${{ steps.prod_outputs.outputs.email_templates_table_name }}
      email_templates_bucket_name: ${{ steps.prod_outputs.outputs.email_templates_bucket_name }}
      action_log_table_name: ${{ steps.prod_outputs.outputs.action_log_table_name }}
      subscriptions_table_name: ${{ steps.prod_outputs.outputs.subscriptions_table_name }}
      subscriptions_table_user_index_name: ${{ steps.prod_outputs.outputs.subscriptions_table_user_index_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create local AWS profile for SDK-based tests
        shell: bash
        run: |
          set -euo pipefail
          aws configure set aws_access_key_id "${{ secrets.AWS_ACCESS_KEY_ID }}" --profile "${{ env.AWS_PROFILE_NAME }}"
          aws configure set aws_secret_access_key "${{ secrets.AWS_SECRET_ACCESS_KEY }}" --profile "${{ env.AWS_PROFILE_NAME }}"
          aws configure set region "${{ env.AWS_REGION }}" --profile "${{ env.AWS_PROFILE_NAME }}"
          echo "AWS_PROFILE=${{ env.AWS_PROFILE_NAME }}" >> "$GITHUB_ENV"
          echo "AWS_SDK_LOAD_CONFIG=1" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Node.js for lambda packaging
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install zip tool
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Build and package lambda artifacts required by Terraform
        shell: bash
        run: |
          set -euo pipefail
          for lambda_dir in \
            "src/Infrastructure/terraform/Lambdas/Payments" \
            "src/Infrastructure/terraform/Lambdas/SendEmail" \
            "src/Infrastructure/terraform/Lambdas/VerificationCode"
          do
            pushd "$lambda_dir" >/dev/null
            pnpm install --no-frozen-lockfile
            pnpm run build
            pnpm run zip
            popd >/dev/null
          done

      - name: Terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init

      - name: Select/Create prod workspace
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform workspace select -or-create "${{ needs.prepare.outputs.prod_workspace }}"

      - name: Terraform apply (prod-style branch environment)
        working-directory: ${{ env.TERRAFORM_DIR }}
        env:
          TF_VAR_prod_deployment: "true"
          TF_VAR_create_ssh_key_pair: "true"
          TF_VAR_stripe_api_key: ${{ secrets.STRIPE_API_KEY }}
          TF_VAR_stripe_event_bus_arn: ${{ secrets.STRIPE_EVENT_BUS_ARN }}
          TF_VAR_password_reset_token_secret: ${{ secrets.PASSWORD_RESET_TOKEN_SECRET }}
        run: terraform apply -auto-approve

      - name: Select/Create test workspace
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform workspace select -or-create "${{ needs.prepare.outputs.test_workspace }}"

      - name: Terraform apply (test environment)
        working-directory: ${{ env.TERRAFORM_DIR }}
        env:
          TF_VAR_prod_deployment: "false"
          TF_VAR_create_ssh_key_pair: "true"
          TF_VAR_stripe_api_key: ${{ secrets.STRIPE_API_KEY }}
          TF_VAR_stripe_event_bus_arn: ${{ secrets.STRIPE_EVENT_BUS_ARN }}
          TF_VAR_password_reset_token_secret: ${{ secrets.PASSWORD_RESET_TOKEN_SECRET }}
        run: terraform apply -auto-approve

      - name: Reselect prod workspace for deploy outputs
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform workspace select "${{ needs.prepare.outputs.prod_workspace }}"

      - name: Export Terraform outputs
        id: prod_outputs
        working-directory: ${{ env.TERRAFORM_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          require_output() {
            local key="$1"
            local value
            value="$(terraform output -raw "$key" 2>/dev/null || true)"
            if [[ -z "${value:-}" || "${value}" == "null" ]]; then
              echo "Required terraform output '$key' is empty or missing."
              exit 1
            fi
            printf "%s" "$value"
          }

          maybe_output() {
            local key="$1"
            local value
            value="$(terraform output -raw "$key" 2>/dev/null || true)"
            if [[ -z "${value:-}" ]]; then
              printf "null"
            else
              printf "%s" "$value"
            fi
          }

          backend_api_gateway_endpoint="$(maybe_output backend_api_gateway_endpoint)"
          backend_api_gateway_base_route="$(maybe_output backend_api_gateway_base_route)"
          backend_ecr_repository_url="$(require_output backend_ecr_repository_url)"
          backend_ec2_instance_id="$(maybe_output backend_ec2_instance_id)"
          backend_ec2_ssh_private_key_ssm_parameter_name="$(maybe_output backend_ec2_ssh_private_key_ssm_parameter_name)"
          users_table_name="$(require_output users_table_name)"
          user_codes_table_name="$(require_output user_codes_table_name)"
          cognito_pool_id="$(require_output cognito_pool_id)"
          cognito_client_id="$(require_output cognito_client_id)"
          verification_codes_table_name="$(require_output verification_codes_table_name)"
          email_templates_table_name="$(require_output email_templates_table_name)"
          email_templates_bucket_name="$(require_output email_templates_bucket_name)"
          action_log_table_name="$(require_output action_log_table_name)"
          subscriptions_table_name="$(require_output subscriptions_table_name)"
          subscriptions_table_user_index_name="$(require_output subscriptions_table_user_index_name)"

          {
            echo "backend_api_gateway_endpoint=$backend_api_gateway_endpoint"
            echo "backend_api_gateway_base_route=$backend_api_gateway_base_route"
            echo "backend_ecr_repository_url=$backend_ecr_repository_url"
            echo "backend_ec2_instance_id=$backend_ec2_instance_id"
            echo "backend_ec2_ssh_private_key_ssm_parameter_name=$backend_ec2_ssh_private_key_ssm_parameter_name"
            echo "users_table_name=$users_table_name"
            echo "user_codes_table_name=$user_codes_table_name"
            echo "cognito_pool_id=$cognito_pool_id"
            echo "cognito_client_id=$cognito_client_id"
            echo "verification_codes_table_name=$verification_codes_table_name"
            echo "email_templates_table_name=$email_templates_table_name"
            echo "email_templates_bucket_name=$email_templates_bucket_name"
            echo "action_log_table_name=$action_log_table_name"
            echo "subscriptions_table_name=$subscriptions_table_name"
            echo "subscriptions_table_user_index_name=$subscriptions_table_user_index_name"
          } >> "$GITHUB_OUTPUT"

          cat > terraform-prod-outputs.env <<EOF
          backend_api_gateway_endpoint=$backend_api_gateway_endpoint
          backend_api_gateway_base_route=$backend_api_gateway_base_route
          backend_ecr_repository_url=$backend_ecr_repository_url
          backend_ec2_instance_id=$backend_ec2_instance_id
          backend_ec2_ssh_private_key_ssm_parameter_name=$backend_ec2_ssh_private_key_ssm_parameter_name
          users_table_name=$users_table_name
          user_codes_table_name=$user_codes_table_name
          cognito_pool_id=$cognito_pool_id
          cognito_client_id=$cognito_client_id
          verification_codes_table_name=$verification_codes_table_name
          email_templates_table_name=$email_templates_table_name
          email_templates_bucket_name=$email_templates_bucket_name
          action_log_table_name=$action_log_table_name
          subscriptions_table_name=$subscriptions_table_name
          subscriptions_table_user_index_name=$subscriptions_table_user_index_name
          EOF

      - name: Upload Terraform prod outputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-prod-outputs
          path: ${{ env.TERRAFORM_DIR }}/terraform-prod-outputs.env
          if-no-files-found: error

      - name: Validate required prod outputs are present
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ steps.prod_outputs.outputs.cognito_pool_id }}"
          test -n "${{ steps.prod_outputs.outputs.users_table_name }}"
          test -n "${{ steps.prod_outputs.outputs.backend_ecr_repository_url }}"
          test "${{ steps.prod_outputs.outputs.backend_ecr_repository_url }}" != "null"

      - name: Export Terraform outputs (test workspace)
        id: outputs_test
        working-directory: ${{ env.TERRAFORM_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          terraform workspace select "${{ needs.prepare.outputs.test_workspace }}"
          {
            echo "verification_codes_table_name=$(terraform output -raw verification_codes_table_name)"
            echo "user_codes_table_name=$(terraform output -raw user_codes_table_name)"
          } >> "$GITHUB_OUTPUT"
  
  tests:
    name: Run Tests With Console Logs
    id: tests
    runs-on: ubuntu-latest
    needs: [prepare, terraform]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create local AWS profile for SDK-based tools
        shell: bash
        run: |
          set -euo pipefail
          aws configure set aws_access_key_id "${{ secrets.AWS_ACCESS_KEY_ID }}" --profile "${{ env.AWS_PROFILE_NAME }}"
          aws configure set aws_secret_access_key "${{ secrets.AWS_SECRET_ACCESS_KEY }}" --profile "${{ env.AWS_PROFILE_NAME }}"
          aws configure set region "${{ env.AWS_REGION }}" --profile "${{ env.AWS_PROFILE_NAME }}"
          echo "AWS_PROFILE=${{ env.AWS_PROFILE_NAME }}" >> "$GITHUB_ENV"
          echo "AWS_SDK_LOAD_CONFIG=1" >> "$GITHUB_ENV"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init

      - name: Sync terraform outputs into appsettings files
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          PASSWORD_RESET_TOKEN_SECRET: ${{ secrets.PASSWORD_RESET_TOKEN_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_API_KEY }}
        run: |
          chmod +x ./update-appsettings-from-terraform.sh
          ./update-appsettings-from-terraform.sh "${{ env.TERRAFORM_DIR }}" "src/Web/appsettings.Test.json" "${{ needs.prepare.outputs.test_workspace }}"

      - name: Restore
        run: dotnet restore VibraHeka.slnx

      - name: Run all .NET tests (verbose console logs)
        env:
          ASPNETCORE_ENVIRONMENT: Development
          Stripe__SecretKey: ${{ secrets.STRIPE_API_KEY }}
          AWS_CODES_TABLE: ${{ needs.terraform.outputs.test_verification_codes_table_name }}
          AWS_USER_CODES_TABLE: ${{ needs.terraform.outputs.test_user_codes_table_name }}
        run: dotnet test VibraHeka.slnx --logger "console;verbosity=detailed"

  build_and_push:
    name: Build Docker Image And Push To ECR
    runs-on: ubuntu-latest
    needs: [ prepare, terraform, tests ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Terraform prod outputs artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-prod-outputs
          path: /tmp/terraform-outputs

      - name: Load Terraform prod outputs
        id: tf_out
        shell: bash
        run: |
          set -euo pipefail
          source /tmp/terraform-outputs/terraform-prod-outputs.env
          echo "backend_ecr_repository_url=${backend_ecr_repository_url}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init

      - name: Sync terraform outputs into appsettings files
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          PASSWORD_RESET_TOKEN_SECRET: ${{ secrets.PASSWORD_RESET_TOKEN_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_API_KEY }}
        run: |
          chmod +x ./update-appsettings-from-terraform.sh
          ./update-appsettings-from-terraform.sh "${{ env.TERRAFORM_DIR }}" "src/Web/appsettings.json" "${{ needs.prepare.outputs.prod_workspace }}"
          ./update-appsettings-from-terraform.sh "${{ env.TERRAFORM_DIR }}" "src/Web/appsettings.Development.json" "${{ needs.prepare.outputs.prod_workspace }}"

      - name: Validate ECR repository output
        shell: bash
        env:
          ECR_REPOSITORY_URL: ${{ steps.tf_out.outputs.backend_ecr_repository_url }}
        run: |
          set -euo pipefail
          if [[ -z "${ECR_REPOSITORY_URL:-}" || "${ECR_REPOSITORY_URL}" == "null" ]]; then
            echo "backend_ecr_repository_url is empty/null. Terraform output is not available."
            exit 1
          fi

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        shell: bash
        env:
          ECR_REPOSITORY_URL: ${{ steps.tf_out.outputs.backend_ecr_repository_url }}
          IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
          BUILD_CONFIGURATION: ${{ needs.prepare.outputs.build_configuration }}
          CACHE_SCOPE: vibraheka-backend-${{ needs.prepare.outputs.workspace }}
        run: |
          set -euo pipefail
          IMAGE_URI="${ECR_REPOSITORY_URL}:${IMAGE_TAG}"
          docker buildx build \
            --platform linux/arm64 \
            --cache-from type=gha,scope="${CACHE_SCOPE}" \
            --cache-to type=gha,mode=max,scope="${CACHE_SCOPE}" \
            --build-arg BUILD_CONFIGURATION="${BUILD_CONFIGURATION}" \
            -t "${IMAGE_URI}" \
            --push \
            .

  seed_default_admin:
    name: Seed Default Admin User
    runs-on: ubuntu-latest
    needs: [ terraform ]
    steps:
      - name: Download Terraform prod outputs artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-prod-outputs
          path: /tmp/terraform-outputs

      - name: Load Terraform prod outputs
        id: tf_out
        shell: bash
        run: |
          set -euo pipefail
          source /tmp/terraform-outputs/terraform-prod-outputs.env
          echo "cognito_pool_id=${cognito_pool_id}" >> "$GITHUB_OUTPUT"
          echo "users_table_name=${users_table_name}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create/confirm Cognito admin and seed DynamoDB admin row
        shell: bash
        env:
          USER_POOL_ID: ${{ steps.tf_out.outputs.cognito_pool_id }}
          USERS_TABLE: ${{ steps.tf_out.outputs.users_table_name }}
          ADMIN_EMAIL: ${{ env.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ env.ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          echo "Seed inputs: USER_POOL_ID='${USER_POOL_ID}', USERS_TABLE='${USERS_TABLE}'"
          if [[ -z "${USER_POOL_ID:-}" || -z "${USERS_TABLE:-}" ]]; then
            echo "USER_POOL_ID or USERS_TABLE is empty; cannot seed admin user."
            exit 1
          fi

          # Create user if it does not exist.
          if ! aws cognito-idp admin-get-user --user-pool-id "$USER_POOL_ID" --username "$ADMIN_EMAIL" >/dev/null 2>&1; then
            aws cognito-idp admin-create-user \
              --user-pool-id "$USER_POOL_ID" \
              --username "$ADMIN_EMAIL" \
              --user-attributes \
                Name=email,Value="$ADMIN_EMAIL" \
                Name=email_verified,Value=true \
                Name=name,Value="Default Admin" \
              --message-action SUPPRESS
          fi

          # Force a permanent password and confirmed state.
          aws cognito-idp admin-set-user-password \
            --user-pool-id "$USER_POOL_ID" \
            --username "$ADMIN_EMAIL" \
            --password "$ADMIN_PASSWORD" \
            --permanent

          SUB="$(aws cognito-idp admin-get-user \
            --user-pool-id "$USER_POOL_ID" \
            --username "$ADMIN_EMAIL" \
            --query "UserAttributes[?Name=='sub']|[0].Value" \
            --output text)"

          NOW="$(date -u +"%Y-%m-%dT%H:%M:%S.0000000+00:00")"

          # Upsert admin record in users table.
          aws dynamodb put-item \
            --table-name "$USERS_TABLE" \
            --item "{
              \"Id\": {\"S\": \"$SUB\"},
              \"CustomerID\": {\"S\": \"\"},
              \"Email\": {\"S\": \"$ADMIN_EMAIL\"},
              \"FirstName\": {\"S\": \"Default\"},
              \"MiddleName\": {\"S\": \"\"},
              \"LastName\": {\"S\": \"Admin\"},
              \"PhoneNumber\": {\"S\": \"+34600000000\"},
              \"Bio\": {\"S\": \"System default administrator\"},
              \"TimezoneID\": {\"S\": \"Europe/Madrid\"},
              \"ProfilePictureUrl\": {\"S\": \"\"},
              \"Role\": {\"S\": \"Admin\"},
              \"Created\": {\"S\": \"$NOW\"},
              \"CreatedBy\": {\"S\": \"$SUB\"},
              \"LastModified\": {\"S\": \"$NOW\"},
              \"LastModifiedBy\": {\"S\": \"$SUB\"}
            }"

  deploy_ec2:
    name: Deploy Backend And XRay On EC2
    runs-on: ubuntu-latest
    needs: [ build_and_push ]
    steps:
      - name: Download Terraform prod outputs artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-prod-outputs
          path: /tmp/terraform-outputs

      - name: Compute image URI for deploy
        id: deploy_image
        shell: bash
        run: |
          set -euo pipefail
          source /tmp/terraform-outputs/terraform-prod-outputs.env
          IMAGE_URI="${backend_ecr_repository_url}:${{ needs.prepare.outputs.image_tag }}"
          if [[ -z "${backend_ecr_repository_url:-}" || "${backend_ecr_repository_url}" == "null" ]]; then
            echo "backend_ecr_repository_url is empty/null; cannot compute deploy image URI."
            exit 1
          fi
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Session Manager plugin (for SSH over SSM)
        shell: bash
        run: |
          set -euo pipefail
          curl -sSLo /tmp/session-manager-plugin.deb https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb
          sudo dpkg -i /tmp/session-manager-plugin.deb

      - name: Retrieve generated SSH private key from SSM
        shell: bash
        env:
          SSH_KEY_PARAM: ${{ needs.terraform.outputs.backend_ec2_ssh_private_key_ssm_parameter_name }}
        run: |
          set -euo pipefail
          aws ssm get-parameter --name "$SSH_KEY_PARAM" --with-decryption --query Parameter.Value --output text > /tmp/vibraheka-ec2.key
          chmod 600 /tmp/vibraheka-ec2.key

      - name: Build SSH config for SSM tunnel
        shell: bash
        env:
          EC2_INSTANCE_ID: ${{ needs.terraform.outputs.backend_ec2_instance_id }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          cat > ~/.ssh/config <<EOF
          Host vibraheka-ec2
            User ec2-user
            HostName 127.0.0.1
            IdentityFile /tmp/vibraheka-ec2.key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyCommand sh -c "aws ssm start-session --target ${EC2_INSTANCE_ID} --document-name AWS-StartSSHSession --parameters 'portNumber=%p'"
          EOF

      - name: Deploy backend + xray containers in EC2
        shell: bash
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          IMAGE_URI: ${{ steps.deploy_image.outputs.image_uri }}
          APP_ENVIRONMENT: ${{ needs.prepare.outputs.environment_name }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ssh vibraheka-ec2 "AWS_REGION='${AWS_REGION}' AWS_ACCOUNT_ID='${AWS_ACCOUNT_ID}' IMAGE_URI='${IMAGE_URI}' APP_ENVIRONMENT='${APP_ENVIRONMENT}' CI_AWS_ACCESS_KEY_ID='${AWS_ACCESS_KEY_ID}' CI_AWS_SECRET_ACCESS_KEY='${AWS_SECRET_ACCESS_KEY}' bash -s" <<'REMOTE'
            set -euxo pipefail
            echo "[deploy] starting on $(date -u +%FT%TZ)"
            timeout 600 sudo dnf -y update || true
            timeout 600 sudo dnf -y install docker awscli
            timeout 60 sudo systemctl enable docker
            timeout 60 sudo systemctl start docker
            timeout 30 sudo systemctl is-active docker

            # Build shared AWS profiles used by the backend process inside container.
            sudo mkdir -p /opt/vibraheka/.aws
            sudo chmod 700 /opt/vibraheka/.aws
            sudo sh -c "printf '%s\n' \
              '[default]' \
              'aws_access_key_id = ${CI_AWS_ACCESS_KEY_ID}' \
              'aws_secret_access_key = ${CI_AWS_SECRET_ACCESS_KEY}' \
              '' \
              '[Twingers]' \
              'aws_access_key_id = ${CI_AWS_ACCESS_KEY_ID}' \
              'aws_secret_access_key = ${CI_AWS_SECRET_ACCESS_KEY}' \
              > /opt/vibraheka/.aws/credentials"
            sudo sh -c "printf '%s\n' \
              '[default]' \
              'region = ${AWS_REGION}' \
              'output = json' \
              '' \
              '[profile Twingers]' \
              'region = ${AWS_REGION}' \
              'output = json' \
              > /opt/vibraheka/.aws/config"
            sudo chmod 600 /opt/vibraheka/.aws/credentials /opt/vibraheka/.aws/config

            timeout 120 aws ecr get-login-password --region "${AWS_REGION}" \
              | sudo docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

            timeout 300 sudo docker pull "${IMAGE_URI}"

            sudo docker rm -f vibraheka-backend || true
            sudo docker rm -f xray-daemon || true

            # NOTE: Pulling from public.ecr.aws can hang/fail in private subnets without NAT.
            if timeout 120 sudo docker pull public.ecr.aws/xray/aws-xray-daemon:latest; then
              sudo docker run -d \
                --name xray-daemon \
                --restart always \
                -p 2000:2000/udp \
                -e AWS_ACCESS_KEY_ID=${CI_AWS_ACCESS_KEY_ID} \
                -e AWS_SECRET_ACCESS_KEY=${CI_AWS_SECRET_ACCESS_KEY} \
                -e AWS_XRAY_DAEMON_ADDRESS="127.0.0.1:2000" \
                -e AWS_REGION="${AWS_REGION}" \
                -v /opt/vibraheka/.aws:/root/.aws:ro \
                public.ecr.aws/xray/aws-xray-daemon:latest
            else
              echo "[deploy] xray image pull skipped (no internet/public registry access)."
            fi

            sudo docker run -d \
              --name vibraheka-backend \
              --restart always \
              -p 8080:8080 \
              -e ASPNETCORE_ENVIRONMENT="${APP_ENVIRONMENT}" \
              -e AWS_PROFILE="Twingers" \
              -e AWS__Profile="Twingers" \
              -e AWSLogging__Profile="Twingers" \
              -v /opt/vibraheka/.aws:/root/.aws:ro \
              "${IMAGE_URI}"

            sudo docker ps
            echo "[deploy] finished on $(date -u +%FT%TZ)"
          REMOTE
