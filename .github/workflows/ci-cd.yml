name: CI/CD

on:
  push:
    branches:
      - main
      - staging
      - "VH-*"
      - "feature/**"
      - "bugfix/**"
  pull_request:
    branches:
      - main
      - staging

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TERRAFORM_DIR: src/Infrastructure/terraform
  ADMIN_EMAIL: mtesqtsdlc2@gmail.com
  ADMIN_PASSWORD: Password123@

jobs:
  prepare:
    name: Prepare Metadata
    runs-on: ubuntu-latest
    outputs:
      workspace: ${{ steps.meta.outputs.workspace }}
      build_configuration: ${{ steps.meta.outputs.build_configuration }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      environment_name: ${{ steps.meta.outputs.environment_name }}
    steps:
      - name: Compute workspace, image tag and build config
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          RAW_REF="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          WORKSPACE="$(echo "$RAW_REF" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's#[^a-z0-9-]#-#g' \
            | sed -E 's#-+#-#g' \
            | sed -E 's#(^-|-$)##g' \
            | cut -c1-24)"
          if [[ -z "$WORKSPACE" ]]; then WORKSPACE="default"; fi

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            BUILD_CONFIGURATION="Release"
            ENVIRONMENT_NAME="Production"
          else
            BUILD_CONFIGURATION="Debug"
            ENVIRONMENT_NAME="Development"
          fi

          IMAGE_TAG="${WORKSPACE}-${GITHUB_SHA::7}"

          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "build_configuration=$BUILD_CONFIGURATION" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "environment_name=$ENVIRONMENT_NAME" >> "$GITHUB_OUTPUT"

  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [prepare]
    outputs:
      backend_api_gateway_endpoint: ${{ steps.outputs.outputs.backend_api_gateway_endpoint }}
      backend_api_gateway_base_route: ${{ steps.outputs.outputs.backend_api_gateway_base_route }}
      backend_ecr_repository_url: ${{ steps.outputs.outputs.backend_ecr_repository_url }}
      backend_ec2_instance_id: ${{ steps.outputs.outputs.backend_ec2_instance_id }}
      backend_ec2_private_ip: ${{ steps.outputs.outputs.backend_ec2_private_ip }}
      backend_ec2_ssh_private_key_ssm_parameter_name: ${{ steps.outputs.outputs.backend_ec2_ssh_private_key_ssm_parameter_name }}
      users_table_name: ${{ steps.outputs.outputs.users_table_name }}
      cognito_pool_id: ${{ steps.outputs.outputs.cognito_pool_id }}
      cognito_client_id: ${{ steps.outputs.outputs.cognito_client_id }}
      verification_codes_table_name: ${{ steps.outputs.outputs.verification_codes_table_name }}
      email_templates_table_name: ${{ steps.outputs.outputs.email_templates_table_name }}
      email_templates_bucket_name: ${{ steps.outputs.outputs.email_templates_bucket_name }}
      action_log_table_name: ${{ steps.outputs.outputs.action_log_table_name }}
      subscriptions_table_name: ${{ steps.outputs.outputs.subscriptions_table_name }}
      subscriptions_table_user_index_name: ${{ steps.outputs.outputs.subscriptions_table_user_index_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Node.js for lambda packaging
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install zip tool
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Build and package lambda artifacts required by Terraform
        shell: bash
        run: |
          set -euo pipefail
          for lambda_dir in \
            "src/Infrastructure/terraform/Lambdas/Payments" \
            "src/Infrastructure/terraform/Lambdas/SendEmail" \
            "src/Infrastructure/terraform/Lambdas/VerificationCode"
          do
            pushd "$lambda_dir" >/dev/null
            pnpm install --no-frozen-lockfile
            pnpm run build
            pnpm run zip
            popd >/dev/null
          done

      - name: Terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init

      - name: Select/Create workspace
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform workspace select -or-create "${{ needs.prepare.outputs.workspace }}"

      - name: Terraform apply
        working-directory: ${{ env.TERRAFORM_DIR }}
        env:
          TF_VAR_prod_deployment: ${{ github.ref == 'refs/heads/main' }}
          TF_VAR_create_ssh_key_pair: "true"
          TF_VAR_stripe_api_key: ${{ secrets.STRIPE_API_KEY }}
          TF_VAR_stripe_event_bus_arn: ${{ secrets.STRIPE_EVENT_BUS_ARN }}
          TF_VAR_password_reset_token_secret: ${{ secrets.PASSWORD_RESET_TOKEN_SECRET }}
        run: terraform apply -auto-approve

      - name: Export Terraform outputs
        id: outputs
        working-directory: ${{ env.TERRAFORM_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "backend_api_gateway_endpoint=$(terraform output -raw backend_api_gateway_endpoint)"
            echo "backend_api_gateway_base_route=$(terraform output -raw backend_api_gateway_base_route)"
            echo "backend_ecr_repository_url=$(terraform output -raw backend_ecr_repository_url)"
            echo "backend_ec2_instance_id=$(terraform output -raw backend_ec2_instance_id)"
            echo "backend_ec2_private_ip=$(terraform output -raw backend_ec2_private_ip)"
            echo "backend_ec2_ssh_private_key_ssm_parameter_name=$(terraform output -raw backend_ec2_ssh_private_key_ssm_parameter_name)"
            echo "users_table_name=$(terraform output -raw users_table_name)"
            echo "cognito_pool_id=$(terraform output -raw cognito_pool_id)"
            echo "cognito_client_id=$(terraform output -raw cognito_client_id)"
            echo "verification_codes_table_name=$(terraform output -raw verification_codes_table_name)"
            echo "email_templates_table_name=$(terraform output -raw email_templates_table_name)"
            echo "email_templates_bucket_name=$(terraform output -raw email_templates_bucket_name)"
            echo "action_log_table_name=$(terraform output -raw action_log_table_name)"
            echo "subscriptions_table_name=$(terraform output -raw subscriptions_table_name)"
            echo "subscriptions_table_user_index_name=$(terraform output -raw subscriptions_table_user_index_name)"
          } >> "$GITHUB_OUTPUT"

  tests:
    name: Run Tests With Console Logs
    runs-on: ubuntu-latest
    needs: [prepare, terraform]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Sync terraform outputs into appsettings files
        shell: bash
        env:
          PASSWORD_RESET_TOKEN_SECRET: ${{ secrets.PASSWORD_RESET_TOKEN_SECRET }}
        run: |
          chmod +x ./update-appsettings-from-terraform.sh
          ./update-appsettings-from-terraform.sh "${{ env.TERRAFORM_DIR }}" "${{ needs.prepare.outputs.workspace }}"

      - name: Restore
        run: dotnet restore VibraHeka.slnx

      - name: Run all .NET tests (verbose console logs)
        env:
          ASPNETCORE_ENVIRONMENT: Development
        run: dotnet test VibraHeka.slnx --logger "console;verbosity=detailed"

  build_and_push:
    name: Build Docker Image And Push To ECR
    runs-on: ubuntu-latest
    needs: [prepare, terraform, tests]
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync terraform outputs into appsettings files
        shell: bash
        env:
          PASSWORD_RESET_TOKEN_SECRET: ${{ secrets.PASSWORD_RESET_TOKEN_SECRET }}
        run: |
          chmod +x ./update-appsettings-from-terraform.sh
          ./update-appsettings-from-terraform.sh "${{ env.TERRAFORM_DIR }}" "${{ needs.prepare.outputs.workspace }}"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: meta
        shell: bash
        env:
          ECR_REPOSITORY_URL: ${{ needs.terraform.outputs.backend_ecr_repository_url }}
          IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
          BUILD_CONFIGURATION: ${{ needs.prepare.outputs.build_configuration }}
        run: |
          set -euo pipefail
          IMAGE_URI="${ECR_REPOSITORY_URL}:${IMAGE_TAG}"
          docker build --build-arg BUILD_CONFIGURATION="${BUILD_CONFIGURATION}" -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

  seed_default_admin:
    name: Seed Default Admin User
    runs-on: ubuntu-latest
    needs: [terraform]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create/confirm Cognito admin and seed DynamoDB admin row
        shell: bash
        env:
          USER_POOL_ID: ${{ needs.terraform.outputs.cognito_pool_id }}
          USERS_TABLE: ${{ needs.terraform.outputs.users_table_name }}
          ADMIN_EMAIL: ${{ env.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ env.ADMIN_PASSWORD }}
        run: |
          set -euo pipefail

          # Create user if it does not exist.
          if ! aws cognito-idp admin-get-user --user-pool-id "$USER_POOL_ID" --username "$ADMIN_EMAIL" >/dev/null 2>&1; then
            aws cognito-idp admin-create-user \
              --user-pool-id "$USER_POOL_ID" \
              --username "$ADMIN_EMAIL" \
              --user-attributes \
                Name=email,Value="$ADMIN_EMAIL" \
                Name=email_verified,Value=true \
                Name=name,Value="Default Admin" \
              --message-action SUPPRESS
          fi

          # Force a permanent password and confirmed state.
          aws cognito-idp admin-set-user-password \
            --user-pool-id "$USER_POOL_ID" \
            --username "$ADMIN_EMAIL" \
            --password "$ADMIN_PASSWORD" \
            --permanent

          SUB="$(aws cognito-idp admin-get-user \
            --user-pool-id "$USER_POOL_ID" \
            --username "$ADMIN_EMAIL" \
            --query "UserAttributes[?Name=='sub']|[0].Value" \
            --output text)"

          NOW="$(date -u +"%Y-%m-%dT%H:%M:%S.0000000+00:00")"

          # Upsert admin record in users table.
          aws dynamodb put-item \
            --table-name "$USERS_TABLE" \
            --item "{
              \"Id\": {\"S\": \"$SUB\"},
              \"CustomerID\": {\"S\": \"\"},
              \"Email\": {\"S\": \"$ADMIN_EMAIL\"},
              \"FirstName\": {\"S\": \"Default\"},
              \"MiddleName\": {\"S\": \"\"},
              \"LastName\": {\"S\": \"Admin\"},
              \"PhoneNumber\": {\"S\": \"+34600000000\"},
              \"Bio\": {\"S\": \"System default administrator\"},
              \"TimezoneID\": {\"S\": \"Europe/Madrid\"},
              \"ProfilePictureUrl\": {\"S\": \"\"},
              \"Role\": {\"S\": \"Admin\"},
              \"Created\": {\"S\": \"$NOW\"},
              \"CreatedBy\": {\"S\": \"$SUB\"},
              \"LastModified\": {\"S\": \"$NOW\"},
              \"LastModifiedBy\": {\"S\": \"$SUB\"}
            }"

  deploy_ec2:
    name: Deploy Backend And XRay On EC2
    runs-on: ubuntu-latest
    needs: [prepare, terraform, build_and_push]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Session Manager plugin (for SSH over SSM)
        shell: bash
        run: |
          set -euo pipefail
          curl -sSLo /tmp/session-manager-plugin.deb https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb
          sudo dpkg -i /tmp/session-manager-plugin.deb

      - name: Retrieve generated SSH private key from SSM
        shell: bash
        env:
          SSH_KEY_PARAM: ${{ needs.terraform.outputs.backend_ec2_ssh_private_key_ssm_parameter_name }}
        run: |
          set -euo pipefail
          aws ssm get-parameter --name "$SSH_KEY_PARAM" --with-decryption --query Parameter.Value --output text > /tmp/vibraheka-ec2.key
          chmod 600 /tmp/vibraheka-ec2.key

      - name: Build SSH config for SSM tunnel
        shell: bash
        env:
          EC2_INSTANCE_ID: ${{ needs.terraform.outputs.backend_ec2_instance_id }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          cat > ~/.ssh/config <<EOF
          Host vibraheka-ec2
            User ec2-user
            HostName 127.0.0.1
            IdentityFile /tmp/vibraheka-ec2.key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyCommand sh -c "aws ssm start-session --target ${EC2_INSTANCE_ID} --document-name AWS-StartSSHSession --parameters 'portNumber=%p'"
          EOF

      - name: Deploy backend + xray containers in EC2
        shell: bash
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          IMAGE_URI: ${{ needs.build_and_push.outputs.image_uri }}
          APP_ENVIRONMENT: ${{ needs.prepare.outputs.environment_name }}
        run: |
          set -euo pipefail
          ssh vibraheka-ec2 "AWS_REGION='${AWS_REGION}' IMAGE_URI='${IMAGE_URI}' APP_ENVIRONMENT='${APP_ENVIRONMENT}' bash -s" <<'REMOTE'
            set -euo pipefail
            sudo dnf -y update || true
            sudo dnf -y install docker awscli
            sudo systemctl enable docker
            sudo systemctl start docker

            AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
            aws ecr get-login-password --region "${AWS_REGION}" \
              | sudo docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

            sudo docker pull "${IMAGE_URI}"
            sudo docker pull public.ecr.aws/xray/aws-xray-daemon:latest

            sudo docker rm -f vibraheka-backend || true
            sudo docker rm -f xray-daemon || true

            sudo docker run -d \
              --name xray-daemon \
              --restart always \
              -p 2000:2000/udp \
              public.ecr.aws/xray/aws-xray-daemon:latest

            sudo docker run -d \
              --name vibraheka-backend \
              --restart always \
              -p 80:8080 \
              -e ASPNETCORE_ENVIRONMENT="${APP_ENVIRONMENT}" \
              "${IMAGE_URI}"

            sudo docker ps
          REMOTE
