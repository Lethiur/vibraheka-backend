name: Shutdown Environment

on:
  pull_request:
    # Trigger cleanup when a PR lifecycle ends.
    types: [closed]

jobs:
  terraform_destroy:
    name: Destroy Terraform Workspace For Closed PR
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TERRAFORM_DIR: src/Infrastructure/terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Node.js for lambda packaging
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install zip tool
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Compute workspace names from PR branch
        id: workspace
        shell: bash
        run: |
          set -euo pipefail
          RAW_REF="${{ github.event.pull_request.head.ref }}"
          BASE_WORKSPACE="$(echo "$RAW_REF" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's#[^a-z0-9-]#-#g' \
            | sed -E 's#-+#-#g' \
            | sed -E 's#(^-|-$)##g' \
            | cut -c1-18)"
          if [[ -z "$BASE_WORKSPACE" ]]; then
            BASE_WORKSPACE="default"
          fi
          echo "base=$BASE_WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "prod=${BASE_WORKSPACE}-prod" >> "$GITHUB_OUTPUT"
          echo "test=${BASE_WORKSPACE}-test" >> "$GITHUB_OUTPUT"

      - name: Build and package lambda artifacts
        shell: bash
        run: |
          set -euo pipefail
          for lambda_dir in \
            "src/Infrastructure/terraform/Lambdas/Payments" \
            "src/Infrastructure/terraform/Lambdas/SendEmail" \
            "src/Infrastructure/terraform/Lambdas/VerificationCode"
          do
            pushd "$lambda_dir" >/dev/null
            pnpm install --no-frozen-lockfile
            pnpm run build
            pnpm run zip
            popd >/dev/null
          done

      - name: Terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init

      - name: Terraform destroy workspace resources
        working-directory: ${{ env.TERRAFORM_DIR }}
        env:
          TF_VAR_prod_deployment: "false"
          TF_VAR_create_ssh_key_pair: "true"
          TF_VAR_stripe_api_key: ${{ secrets.STRIPE_API_KEY }}
          TF_VAR_stripe_event_bus_arn: ${{ secrets.STRIPE_EVENT_BUS_ARN }}
          TF_VAR_password_reset_token_secret: ${{ secrets.PASSWORD_RESET_TOKEN_SECRET }}
        shell: bash
        run: |
          set -euo pipefail
          had_failure=0
          for WS in "${{ steps.workspace.outputs.prod }}" "${{ steps.workspace.outputs.test }}"; do
            if [[ "$WS" == *"-prod" ]]; then
              export TF_VAR_prod_deployment="true"
            else
              export TF_VAR_prod_deployment="false"
            fi

            if ! terraform workspace select "$WS" >/dev/null 2>&1; then
              echo "Workspace '$WS' does not exist. Nothing to destroy."
              continue
            fi

            echo "Destroying workspace '$WS' (TF_VAR_prod_deployment=${TF_VAR_prod_deployment})..."
            if ! terraform destroy -auto-approve; then
              echo "Destroy failed for workspace '$WS'."
              had_failure=1
            fi
          done
          exit "$had_failure"

      - name: Delete terraform workspace after destroy
        working-directory: ${{ env.TERRAFORM_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          terraform workspace select default
          terraform workspace delete "${{ steps.workspace.outputs.prod }}" || true
          terraform workspace delete "${{ steps.workspace.outputs.test }}" || true
