name: OpenSSL Decrypt File
description: Decrypt a file encrypted by OpenSSL (AES-256-GCM + PBKDF2).

inputs:
  in:
    description: Path to encrypted input file.
    required: true
  out:
    description: Path to decrypted output file.
    required: true
  passphrase:
    description: Passphrase used to derive decryption key (keep secret).
    required: true
  iter:
    description: PBKDF2 iterations.
    required: false
    default: "200000"

runs:
  using: composite
  steps:
    - name: Decrypt
      shell: bash
      env:
        OPENSSL_PASSPHRASE: ${{ inputs.passphrase }}
        OPENSSL_ITER: ${{ inputs.iter }}
      run: |
        set -euo pipefail
        openssl enc -d -aes-256-gcm -pbkdf2 -iter "${OPENSSL_ITER}" \
          -pass env:OPENSSL_PASSPHRASE \
          -in "${{ inputs.in }}" \
          -out "${{ inputs.out }}"
